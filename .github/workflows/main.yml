name: Release Resourcepack

on:
  push:
    paths:
      - 'generated.zip'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Delete old release
        run: |
          gh release delete latest --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        run: |
          gh release create latest generated.zip \
            --title "Resourcepack" \
            --notes "Auto-updated"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
